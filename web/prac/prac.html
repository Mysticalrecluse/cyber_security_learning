<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            background-color: #3064bb;
            width: 200px;
            height: 80px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            line-height: 80px;       
        }
        div:hover {
            background-color: #608dd9;
        }
        
    </style>
</head>
<body>
    <script>
        var a = 10
        var b = 10
        console.log(a++)
        console.log(++a)
        console.log(--b)
        console.log(b--)
    </script>
</body>
</html>
